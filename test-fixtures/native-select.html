<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AutoKorea — native select fixture</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; padding: 24px; max-width: 700px; }
    fieldset { margin: 18px 0; padding: 14px 18px; border: 1px solid #ccc; border-radius: 6px; }
    legend { padding: 0 6px; font-weight: 600; }
    label { display: block; margin: 6px 0 4px; font-weight: 500; }
    select { width: 100%; padding: 6px 8px; font: inherit; }
    .out { font: 12px ui-monospace, monospace; color: #555; margin-top: 6px; }
  </style>
</head>

  <fieldset>
    <legend>4. 무시돼야 할 select (월 선택, 옵션 12개)</legend>
    <label for="m1">Month</label>
    <select id="m1" data-fixture="month-ignore">
      <option value="">--</option>
      <option>January</option>
      <option>February</option>
      <option>March</option>
      <option>April</option>
      <option>May</option>
      <option>June</option>
      <option>July</option>
      <option>August</option>
      <option>September</option>
      <option>October</option>
      <option>November</option>
      <option>December</option>
    </select>
    <div class="out" id="m1-out">↑ 이 select는 옵션이 50개 미만이라 건드리면 안 됨</div>
  </fieldset>

  <script>
    function refresh() {
      for (const s of document.querySelectorAll("select")) {
        const out = document.getElementById(s.id + "-out");
        if (!out) continue;
        const sel = s.options[s.selectedIndex];
        out.textContent = `value=${JSON.stringify(s.value)} label=${JSON.stringify(sel ? sel.textContent : null)}`;
      }
    }
    document.addEventListener("change", refresh, true);
    setInterval(refresh, 500);
    refresh();
  </script>

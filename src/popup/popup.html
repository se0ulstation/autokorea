<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>AutoKorea</title>
  <style>
    body {
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      margin: 0;
      padding: 14px 16px 12px;
      width: 260px;
      color: #111;
      background: #fff;
    }
    h1 { font-size: 14px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    h1 .flag { font-size: 18px; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .row + .row { border-top: 1px solid #f1f1f3; }
    .label { font-weight: 500; }
    .host { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: #666; word-break: break-all; }
    .switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #d1d5db; border-radius: 18px; cursor: pointer;
      transition: background .15s;
    }
    .slider::before {
      content: ""; position: absolute; left: 2px; top: 2px;
      width: 14px; height: 14px; background: #fff; border-radius: 50%;
      transition: transform .15s;
    }
    .switch input:checked + .slider { background: #111; }
    .switch input:checked + .slider::before { transform: translateX(14px); }
    .footer { display: flex; gap: 14px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; font-size: 12px; }
    .link { color: #2563eb; cursor: pointer; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .empty { color: #888; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>
  <h1><span class="flag">🇰🇷</span> AutoKorea</h1>

  <div class="row">
    <span class="label">전체 활성화</span>
    <span class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </span>
  </div>

  <div class="row">
    <span>
      <div class="label">이 사이트</div>
      <div class="host" id="host">—</div>
    </span>
    <span class="switch">
      <input type="checkbox" id="site-enabled" />
      <span class="slider"></span>
    </span>
  </div>

  <div class="footer">
    <span class="link" id="open-options">옵션</span>
    <span class="link" id="reload-tab">새로고침</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
